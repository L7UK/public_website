<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer 7 — New website coming soon</title>
<meta name="robots" content="noindex">
<meta name="description" content="Layer 7's new website is coming soon.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --l7-ink: #0c0518;
    --l7-dark-purple: #140a23;
    --l7-mid-purple: #1f1257;
    --l7-paper: #fbfcfe;
    --l7-bright-purple: #a867f7;
    --l7-bright-soft: #c69bfa;
    --l7-glow: rgba(168,103,247,0.35);
    --l7-text-dim: rgba(255,255,255,0.68);
    --l7-hairline: rgba(255,255,255,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: 'Raleway', Arial, Helvetica, sans-serif;
    font-weight: 400;
    background: var(--l7-dark-purple);
    background-image:
      radial-gradient(900px 500px at 78% -10%, rgba(168,103,247,0.18), transparent 60%),
      radial-gradient(700px 600px at -5% 110%, rgba(31,18,87,0.55), transparent 55%);
    color: var(--l7-paper);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  .card {
    width: 100%;
    max-width: 640px;
    text-align: left;
  }

  /* Wordmark */
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 56px;
  }
  .brand svg { display: block; }
  .brand .name {
    font-weight: 400;
    font-size: 1.5rem;
    letter-spacing: 0.02em;
  }
  .brand .name b { font-weight: 600; }

  .eyebrow {
    font-family: 'JetBrains Mono', Consolas, monospace;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 0.72rem;
    color: var(--l7-bright-soft);
    margin-bottom: 24px;
  }

  h1 {
    font-weight: 200;
    font-size: clamp(2.4rem, 7vw, 3.6rem);
    line-height: 1.05;
    letter-spacing: -0.01em;
    margin-bottom: 24px;
  }
  h1 i { font-weight: 600; font-style: italic; color: var(--l7-bright-soft); }

  p.lede {
    font-weight: 300;
    font-size: 1.12rem;
    line-height: 1.6;
    color: var(--l7-text-dim);
    max-width: 52ch;
    margin-bottom: 40px;
  }

  .divider {
    height: 1px;
    background: var(--l7-hairline);
    margin: 40px 0 28px;
  }

  .contact {
    display: flex;
    flex-wrap: wrap;
    gap: 28px 56px;
  }
  .contact .label {
    font-family: 'JetBrains Mono', Consolas, monospace;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 0.66rem;
    color: var(--l7-text-dim);
    margin-bottom: 8px;
  }
  .contact a, .contact span.val {
    color: var(--l7-paper);
    text-decoration: none;
    font-size: 1.05rem;
    font-weight: 400;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .contact a:hover {
    color: var(--l7-bright-soft);
    border-color: var(--l7-bright-purple);
  }
  .contact a::after { content: ' \2192'; color: var(--l7-bright-purple); }

  footer {
    padding: 28px 24px;
    border-top: 1px solid var(--l7-hairline);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .rail {
    font-family: 'JetBrains Mono', Consolas, monospace;
    text-transform: lowercase;
    letter-spacing: 0.22em;
    font-size: 0.7rem;
    color: var(--l7-text-dim);
  }
  .rail .dot { color: var(--l7-bright-purple); padding: 0 6px; }

  @media (max-width: 480px) {
    .brand { margin-bottom: 40px; }
    .contact { gap: 24px 40px; }
  }
</style>
</head>
<body>
  <main class="wrap">
    <div class="card">
      <div class="brand" aria-label="Layer 7">
        <span class="name">Layer<b>7</b></span>
      </div>

      <div class="eyebrow">New website coming soon</div>

      <h1>We'll be back <i>shortly</i>.</h1>

      <p class="lede">
        Our website is undergoing maintenance. Service to our clients is unaffected.
        If you need to reach us, the quickest routes are below.
      </p>

      <div class="divider"></div>

      <div class="contact">
        <div>
          <div class="label">Email</div>
          <a href="mailto:hello@layer7.uk">hello@layer7.uk</a>
        </div>
        <div>
          <div class="label">Telephone</div>
          <span class="val">+44 (0) 191 249 6452</span>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="rail">secure<span class="dot">·</span>assure<span class="dot">·</span>manage</div>
  </footer>
</body>
</html>
